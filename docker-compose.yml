services:
  broker:
    image: apache/kafka:4.1.2
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      # KRaft: this node is both a broker and the quorum controller
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Three listeners:
      #   PLAINTEXT_HOST  -> host machine clients (producer.py / consumer.py)
      #   PLAINTEXT       -> internal container-to-container traffic
      #   CONTROLLER      -> KRaft internal consensus
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093

      # Single-node minimums
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # Let the first produce call create the topic automatically,
      # with 3 partitions so consumers can be pinned to specific ones
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

      # Fixed cluster ID (base64-encoded UUID); must stay stable between restarts
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

  elasticsearch:
    image: elasticsearch:8.17.4
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"    # disables auth/TLS — safe for local dev only
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"  # cap heap to keep memory reasonable
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: kibana:8.17.4
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
